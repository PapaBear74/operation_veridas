<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LETTERWARS Board</title>
  <meta name="description" content="Arguments are summarized by AI." />
  <meta property="og:title" content="LETTERWARS Board" />
  <meta property="og:description" content="Arguments are summarized by AI." />
  <meta property="og:url" content="https://www.letterwars.com/" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <h1>LETTERWARS Board</h1>
      <p class="subtitle">Arguments are summarized by AI.</p>
    </header>

    <main class="content">
      <section class="notes" aria-label="Arguments board">
        <div class="topicSelectField">
          <label class="fieldLabel" for="topicSelect">Topic</label>
          <div class="topicSelectWrap">
            <select id="topicSelect" aria-label="Select a topic"></select>
            <div id="topicSelectDisplay" class="topicSelectDisplay" aria-hidden="true"></div>
          </div>
          <div id="adminTopicActions" class="adminTopicActions" style="display:none">
            <button id="deleteTopicBtn" class="btn btnDanger" type="button">Delete topic</button>
          </div>
        </div>

        <div id="emptyState" class="emptyState" role="status" aria-live="polite">
          No topics yet. Enter a password below and create or open a topic.
        </div>

        <div id="board" class="board" aria-label="Arguments list">
          <div id="boardLoading" class="boardLoading" style="display:none">
            <div class="spinner"></div>
            <span class="boardLoadingText">AI compresses arguments…</span>
          </div>
          <div class="boardCols" aria-label="Pro and Contra columns">
            <div class="boardCol">
              <div class="boardColHeader">
                <span class="pill pillPro">Pro</span>
              </div>
              <ol id="proList" class="notesList" aria-label="Pro arguments"></ol>
            </div>
            <div class="boardCol">
              <div class="boardColHeader">
                <span class="pill pillContra">Contra</span>
              </div>
              <ol id="contraList" class="notesList" aria-label="Contra arguments"></ol>
            </div>
          </div>
        </div>
      </section>

      <section class="composer" aria-label="Write an argument">
        <form id="opinionForm" class="composerForm" autocomplete="off">
          <fieldset class="field">
            <legend class="fieldLabel">Choose your side</legend>
            <div class="segmented" role="radiogroup" aria-label="Choose Pro or Contra">
              <label class="segmentedOption">
                <input type="radio" name="side" value="pro" checked />
                <span class="segmentedPill segmentedPillPro">Pro</span>
              </label>
              <label class="segmentedOption">
                <input type="radio" name="side" value="contra" />
                <span class="segmentedPill segmentedPillContra">Contra</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span class="fieldLabel">Argument</span>
            <textarea id="argumentInput" name="argument" rows="6" maxlength="5000" placeholder="Write your argument…"
              required></textarea>
          </label>

          <div class="composerRow">
            <button class="btn btnPrimary" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="createTopicSection">
      <button id="accessTopicBtn" class="btn btnTopicAction" type="button">Access existing topic</button>
      <button id="createTopicBtn" class="btn btnTopicAction" type="button">Create topic</button>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="createTopicModal" class="modalOverlay" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="createTopicModalTitle">
      <h2 id="createTopicModalTitle">Create topic</h2>
      <p class="hint">Note: One password can be used for multiple topics.</p>
      <form id="createTopicModalForm" class="modalForm" autocomplete="off">
        <label class="field">
          <span class="fieldLabel">Topic</span>
          <input id="createTopicTitleInput" name="topicTitle" type="text" maxlength="150" placeholder="Enter topic..." />
        </label>
        <label class="field">
          <span class="fieldLabel">Password</span>
          <input id="createTopicPasswordInput" name="topicPassword" type="password" placeholder="Enter password..." />
        </label>
        <p id="createTopicModalError" class="modalError" role="alert" aria-live="polite"></p>
        <div class="modalActions">
          <button id="createTopicModalCancelBtn" class="btn" type="button">Cancel</button>
          <button id="createTopicModalSubmitBtn" class="btn btnPrimary" type="submit">Create topic</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>

</html>
